services:
  # ========================================
  # Go Backend 文件系统后端服务
  # ========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fs_backend
    restart: unless-stopped
    ports:
      - "10040:10040"
    networks:
      - file-sys
    env_file:
      - .env.production

    # 【生产优化1】资源限制，防止容器占满服务器资源
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

    # 【生产优化2】健康检查，监控服务存活状态
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:10040/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    # 【生产优化3】日志轮转，防止日志无限膨胀占满磁盘
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "3"

networks:
  file-sys:
    external: true
    name: file-sys
